behaviors:
  AudioXY:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
      vis_encode_type: resnet
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10000000
    time_horizon: 100
    summary_freq: 300
env_settings:
  env_path: builds/audio/unity.x86_64
engine_settings:
  time_scale: 1
  target_frame_rate: 50
  capture_frame_rate: 50
  no_graphics: true

